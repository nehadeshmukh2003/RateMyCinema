<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateMyCinema</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>🎬 RateMyCinema</h1>

<input type="text" id="searchBar" placeholder="Search movies...">

</header>

<section class="movies" id="movieList">

<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">

<h2>The Dark Knight</h2>

<p>Genre: Action</p>

<p>Year: 2008</p>

<div class="stars">
<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>
</div>

<p class="rating">Rating: 0</p>

</div>


<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg">

<h2>Interstellar</h2>

<p>Genre: Sci-Fi</p>

<p>Year: 2014</p>

<div class="stars">
<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>
</div>

<p class="rating">Rating: 0</p>

</div>


<div class="movie-card">

<img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg">

<h2>Joker</h2>

<p>Genre: Thriller</p>

<p>Year: 2019</p>

<div class="stars">
<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>
</div>

<p class="rating">Rating: 0</p>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
