<!DOCTYPE html>
<html>

<head>

<title>RateMyCinema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar">

<h2>🎬 RateMyCinema</h2>

<ul>

<li><a href="#home">Home</a></li>

<li><a href="#movies">Movies</a></li>

<li><a href="#feedback">Feedback</a></li>

</ul>

<div class="nav-right">

<input id="search" placeholder="Search movie">

<button id="modeToggle">🌙</button>

<button id="authBtn">Login</button>

</div>

</nav>


<section id="home" class="hero">

<h1>Discover Movies</h1>

<p>Search, Rate and Review Movies</p>

</section>


<section id="movies" class="movies"></section>


<section id="feedback" class="feedback">

<h2>Give Feedback</h2>

<textarea id="feedbackText"></textarea>

<button onclick="submitFeedback()">Submit</button>

</section>


<div id="loginModal" class="modal">

<div class="modal-content">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">

<input id="loginPass" placeholder="Password" type="password">

<button onclick="login()">Login</button>

<p>New user? <span onclick="openSignup()">Signup</span></p>

</div>

</div>


<div id="signupModal" class="modal">

<div class="modal-content">

<h2>Signup</h2>

<input id="name" placeholder="Name">

<input id="email" placeholder="Email">

<input id="pass" placeholder="Password">

<button onclick="signup()">Create Account</button>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
